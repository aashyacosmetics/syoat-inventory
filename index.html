<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Syoat · Inventory ERP</title>

  <!-- Fonts: Fraunces (serif headings) + Inter (UI) + Plus Jakarta Sans (fallback) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>

  <!-- React 18 from CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", "Plus Jakarta Sans", system-ui, sans-serif; background: #efe4d2; }
    #root { min-height: 100vh; }
    /* Loading screen — shown until React mounts */
    #splash {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; background: #efe4d2; gap: 14px;
    }
    #splash img { width: 90px; }
    #splash p { font-size: 13px; color: #a89680; letter-spacing: 0.04em; font-family: "Fraunces", serif; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    #splash p { animation: pulse 1.6s ease-in-out infinite; }

    /* Navigation shell (2026-07-20): mobile — hamburger button opens the sidebar as a
       slide-in drawer with a dimmed overlay; desktop (≥900px) — sidebar is pinned open
       permanently and the hamburger/overlay disappear. */
    .syoat-hamburger { display: flex; align-items: center; justify-content: center; }
    .syoat-sidebar {
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; width: 250px;
      background: #fdf9f1; border-right: 1px solid #e7d9c4; z-index: 140;
      transform: translateX(-100%); transition: transform 0.25s ease;
    }
    .syoat-sidebar.open { transform: translateX(0); }
    .syoat-sidebar-overlay {
      display: none; position: fixed; inset: 0; background: rgba(30,20,10,0.45); z-index: 135;
    }
    .syoat-sidebar-overlay.open { display: block; }
    .syoat-sidebar-close { display: inline-flex; }
    @media (min-width: 900px) {
      .syoat-shell { padding-left: 250px; padding-bottom: 24px; }
      .syoat-hamburger { display: none; }
      .syoat-sidebar { transform: none; z-index: 100; }
      .syoat-sidebar-overlay { display: none !important; }
      .syoat-sidebar-close { display: none; }
    }

    /* Desktop page-fit (≥900px only): mobile keeps every original layout value
       untouched (inline styles), these rules only widen/re-grid on wide screens. */
    @media (min-width: 900px) {
      .syoat-content { max-width: 1400px !important; padding: 0 28px !important; }
      .syoat-product-grid { grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)) !important; }
      .syoat-location-grid { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)) !important; }
      .syoat-kpi-grid { grid-template-columns: repeat(4, 1fr) !important; }
    }
  </style>
</head>
<body>

<!-- Loading splash — replaced by React on mount -->
<div id="splash">
  <img src="syoat-logo.png" alt="Syoat"/>
  <p>Loading Inventory ERP…</p>
</div>

<!-- React mounts here -->
<div id="root"></div>

<!-- App — all logic lives here; update only this file for new features -->
<script src="syoat-app.js?v=20260723a"></script>

</body>
</html>
